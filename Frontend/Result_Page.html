<!DOCTYPE html>
<html lang="en">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="pdf-generator.js"></script>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UOE | Result Page</title>
  <link rel="icon" href="uoe logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      padding: 20px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .header {
      background: white;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    th,
    td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    th {
      background: #4facfe;
      color: white;
    }

    .btn-export {
      margin-top: 20px;
      width: 250px;
      padding: 15px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
      transition: 0.3s;
    }

    .btn-export:hover {
      background: #ff4c4c;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.4);
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>University of Education (UOE)</h1>
    <p id="classInfo">Loading...</p>
    <p id="teacherInfo">Loading...</p>
  </div>

  <table id="resultTable">
    <thead id="thead"></thead>
    <tbody id="resultBody"></tbody>
  </table>

  <button class="btn-export" id="exportBtn">Export as PDF</button>

  <script>
    async function loadData() {
      try {
        // 1. Fetch data from both APIs
        const [resultRes, weightRes] = await Promise.all([
          fetch("http://localhost:3000/result-view"),
          fetch("http://localhost:3000/weightage-calculater")
        ]);

        if (!resultRes.ok || !weightRes.ok) throw new Error("Failed to fetch API data");

        const resultData = await resultRes.json();
        const weightData = await weightRes.json();

        // 2. Update Header Info
        document.getElementById("classInfo").textContent =
          `Subject: ${resultData.subject} | Semester: ${resultData.semester} | Department: ${resultData.department} | Shift: ${resultData.shift}`;

        document.getElementById("teacherInfo").textContent =
          `Teacher Name: ${resultData.teacher_name}`;

        // 3. Setup Dynamic Flags & Weights/Totals
        const hasPractical = weightData.practical_total != null && weightData.practical_weight != null;
        const hasProject = weightData.project_total != null && weightData.project_weight != null;

        // 4. Create Table Header
        const thead = document.getElementById('thead');
        let headerRow = `
        <tr>
          <th>Student Name</th>
          <th>Mid</th>
          <th>Final</th>
          <th>Assignment</th>
          <th>Quizzes</th>
          <th>Presentation</th>
          ${hasPractical ? `<th>Practical</th>` : ''}
          ${hasProject ? `<th>Project</th>` : ''}
          <th>Sessional</th>
          <th>Total (100)</th>
          <th>Percentage (%)</th>
          <th>Grade</th>
          <th>Status</th>
          <th>Class Rank</th>
        </tr>
      `;
        thead.innerHTML = headerRow;

        // 5. Calculation Logic
        function calculateGrades(student) {
          const categories = [
            { key: 'mid', actual: student.mid, total: weightData.mid_total, weight: weightData.mid_weight },
            { key: 'final', actual: student.final, total: weightData.final_total, weight: weightData.final_weight },
            { key: 'assignment', actual: student.assignment, total: weightData.assignment_total, weight: weightData.assignment_weight },
            { key: 'quizzes', actual: student.quizzes, total: weightData.quizzes_total, weight: weightData.quizzes_weight },
            { key: 'presentation', actual: student.presentation, total: weightData.presentation_total, weight: weightData.presentation_weight }
          ];

          if (hasPractical) categories.push({ key: 'practical', actual: student.practical, total: weightData.practical_total, weight: weightData.practical_weight });
          if (hasProject) categories.push({ key: 'project', actual: student.project, total: weightData.project_total, weight: weightData.project_weight });

          let grandTotal = 0;
          let sessionalTotal = 0;

          categories.forEach(cat => {
            const obtained = cat.actual || 0;
            const max = cat.total || 1; // Prevent division by zero
            const weight = cat.weight || 0;

            const contribution = (obtained / max) * weight;
            grandTotal += contribution;

            // Sessional calculation (Everything except Mid and Final)
            if (cat.key !== 'mid' && cat.key !== 'final') {
              sessionalTotal += contribution;
            }
          });

          // Grading logic
          let grade = "F";
          if (grandTotal >= 80) grade = "A";
          else if (grandTotal >= 70) grade = "B";
          else if (grandTotal >= 60) grade = "C";
          else if (grandTotal >= 50) grade = "D";

          return {
            sessional: sessionalTotal.toFixed(2),
            total: grandTotal.toFixed(2),
            percentage: grandTotal.toFixed(2),
            grade: grade,
            status: grandTotal >= 50 ? "Pass" : "Fail"
          };
        }

        // 6. Process Students and Rank
        let students = resultData.students.map(s => ({
          ...s,
          results: calculateGrades(s)
        }));

        // Sort by total marks for ranking
        // Create a copy of totals for ranking
        const totals = students.map(s => parseFloat(s.results.total));

        // Create sorted copy (ONLY for rank calculation, not affecting UI)
        const sortedTotals = [...totals].sort((a, b) => b - a);

        // Assign rank without changing original order
        students = students.map(s => {
          const total = parseFloat(s.results.total);
          const rank = sortedTotals.indexOf(total) + 1;

          return {
            ...s,
            rank: rank
          };
        });

        // 7. Render Table Body
        const resultBody = document.getElementById('resultBody');
        if (students.length === 0) {
          resultBody.innerHTML = "<tr><td colspan='15'>No student records found.</td></tr>";
        } else {
          resultBody.innerHTML = students.map((student, index) => `
            <tr>
                <td>${student.name}</td>
                <td>${student.mid || 0}</td>
                <td>${student.final || 0}</td>
                <td>${student.assignment || 0}</td>
                <td>${student.quizzes || 0}</td>
                <td>${student.presentation || 0}</td>
                ${hasPractical ? `<td>${student.practical || 0}</td>` : ''}
                ${hasProject ? `<td>${student.project || 0}</td>` : ''}
                <td>${student.results.sessional}</td>
                <td>${student.results.total}</td>
                <td>${student.results.percentage}%</td>
                <td><strong>${student.results.grade}</strong></td>
                <td style="color: ${student.results.status === 'Pass' ? 'green' : 'red'}">${student.results.status}</td>
                <td>${student.rank}</td>
            </tr>
          `).join('');
        }

      } catch (error) {
        console.error("Initialization Error:", error);
        document.getElementById("classInfo").textContent = "Error loading data. Check console.";
      }
    }

    loadData();

    // EXPORT PDF - Now calling the function from pdf-generator.js
document.getElementById('exportBtn').addEventListener('click', () => {
    // Pass the IDs of your table and header elements
    exportTableToPDF('resultTable', 'classInfo', 'teacherInfo');
});
  </script>

</body>

</html>
