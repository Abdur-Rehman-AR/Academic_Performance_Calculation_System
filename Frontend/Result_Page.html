<!DOCTYPE html>
<html lang="en">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="pdf-generator.js"></script>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UOE | Result Page</title>
  <link rel="icon" href="uoe logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      padding: 20px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .header {
      background: white;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    th,
    td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    th {
      background: #4facfe;
      color: white;
    }

    .btn-export {
      margin-top: 20px;
      width: 250px;
      padding: 15px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
      transition: 0.3s;
    }

    .btn-export:hover {
      background: #ff4c4c;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.4);
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>University of Education (UOE)</h1>
    <p id="classInfo">Loading...</p>
    <p id="teacherInfo">Loading...</p>
  </div>

  <table id="resultTable">
    <thead id="thead"></thead>
    <tbody id="resultBody"></tbody>
  </table>

  <button class="btn-export" id="exportBtn">Export as PDF</button>

  <script>
    async function loadData() {
      try {
        // 1. Fetch data from both APIs
        const [resultRes, weightRes] = await Promise.all([
          fetch("http://localhost:3000/result-view"),
          fetch("http://localhost:3000/weightage-calculater")
        ]);

        if (!resultRes.ok || !weightRes.ok) throw new Error("Failed to fetch API data");

        const resultData = await resultRes.json();
        const weightData = await weightRes.json();

        // 2. Update Header Info
        document.getElementById("classInfo").textContent =
          `Subject: ${resultData.subject} | Semester: ${resultData.semester} | Department: ${resultData.department} | Shift: ${resultData.shift}`;

        document.getElementById("teacherInfo").textContent =
          `Teacher Name: ${resultData.teacher_name}`;

        // 3. Setup Dynamic Flags
        const hasPractical = weightData.practical_total != null && weightData.practical_weight != null;

        // 4. Create Table Header
        const thead = document.getElementById('thead');
        thead.innerHTML = `
      <tr>
        <th>Student Name</th>
        <th>Mid</th>
        <th>Final</th>
        ${hasPractical ? `<th>Practical</th>` : ''}
        <th>Sessional (20)</th>
        <th>Total (100)</th>
        <th>Percentage (%)</th>
        <th>Grade</th>
        <th>Status</th>
        <th>Class Rank</th>
      </tr>
    `;

        // 5. Calculation Logic
        function calculateGrades(student) {

          // ✅ MID
          const mid_weighted =
            ((student.mid || 0) / (weightData.mid_total || 1)) *
            (weightData.mid_weight || 0);

          // ✅ FINAL
          const final_weighted =
            ((student.final || 0) / (weightData.final_total || 1)) *
            (weightData.final_weight || 0);

          // ✅ PRACTICAL (if exists)
          let practical_weighted = 0;
          if (hasPractical) {
            practical_weighted =
              ((student.practical || 0) / (weightData.practical_total || 1)) *
              (weightData.practical_weight || 0);
          }

          // ✅ 🔥 SESSIONAL ONLY FROM INTERNAL COMPONENTS
          const assignment_weighted =
            ((student.assignment || 0) / (weightData.assignment_total || 1)) *
            (weightData.assignment_weight || 0);

          const quiz_weighted =
            ((student.quizzes || 0) / (weightData.quizzes_total || 1)) *
            (weightData.quizzes_weight || 0);

          const presentation_weighted =
            ((student.presentation || 0) / (weightData.presentation_total || 1)) *
            (weightData.presentation_weight || 0);

          const project_weighted =
            ((student.project || 0) / (weightData.project_total || 1)) *
            (weightData.project_weight || 0);

          // 👉 Only these 4 go into sessional
          const sessionalRaw = assignment_weighted + quiz_weighted + presentation_weighted + project_weighted;

          const sessionalMax =
            (weightData.assignment_weight || 0) +
            (weightData.quizzes_weight || 0) +
            (weightData.presentation_weight || 0) +
            (weightData.project_weight || 0);

          // 🔥 Convert to OUT OF 20
          const sessional =
            sessionalMax > 0 ? (sessionalRaw / sessionalMax) * 20 : 0;

          let totalMarks = (student.mid || 0) + (student.final || 0) + sessional;

if (hasPractical) {
  totalMarks += (student.practical || 0);
}

          // ✅ GRADE
          let grade = "F";
          if (totalMarks >= 90) grade = "A+";
          else if (totalMarks >= 80) grade = "A";
          else if (totalMarks >= 70) grade = "B";
          else if (totalMarks >= 60) grade = "C";
          else if (totalMarks >= 50) grade = "D";

          return {
            sessional: sessional.toFixed(2),
            total: totalMarks.toFixed(2),
            percentage: totalMarks.toFixed(2),
            grade,
            status: totalMarks >= 50 ? "Pass" : "Fail"
          };
        }

        // 6. Process Students and Rank
        let students = resultData.students.map(s => ({
          ...s,
          results: calculateGrades(s)
        }));

        // Ranking logic
        const totals = students.map(s => parseFloat(s.results.total));
        const sortedTotals = [...totals].sort((a, b) => b - a);

        students = students.map(s => {
          const total = parseFloat(s.results.total);
          const rank = sortedTotals.indexOf(total) + 1;
          return { ...s, rank: rank };
        });

        // 7. Render Table Body
        const resultBody = document.getElementById('resultBody');
        if (students.length === 0) {
          resultBody.innerHTML = "<tr><td colspan='10'>No student records found.</td></tr>";
        } else {
          resultBody.innerHTML = students.map(student => `
        <tr>
          <td>${student.name}</td>
          <td>${student.mid || 0}</td>
          <td>${student.final || 0}</td>
          ${hasPractical ? `<td>${student.practical || 0}</td>` : ''}
          <td>${student.results.sessional}</td>
          <td>${student.results.total}</td>
          <td>${student.results.percentage}%</td>
          <td><strong>${student.results.grade}</strong></td>
          <td style="color: ${student.results.status === 'Pass' ? 'green' : 'red'}">${student.results.status}</td>
          <td>${student.rank}</td>
        </tr>
      `).join('');
        }

      } catch (error) {
        console.error("Initialization Error:", error);
        document.getElementById("classInfo").textContent = "Error loading data. Check console.";
      }
    }

    loadData();

    // Export PDF functionality
    document.getElementById('exportBtn').addEventListener('click', () => {
      exportTableToPDF('resultTable', 'classInfo', 'teacherInfo');
    });
  </script>

</body>

</html>
