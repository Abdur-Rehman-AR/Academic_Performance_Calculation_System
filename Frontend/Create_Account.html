<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UOE | Account Creation</title>
  <link rel="icon" href="uoe logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .create-box {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .create-box h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      font-size: 14px;
      color: #555;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
    }

    .create-btn {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .create-btn:hover {
      background: #00c6ff;
    }

    .footer-text {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="create-box">
      <h2>Create Account</h2>

      <form id="createForm" autocomplete="chrome-off">

        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" autocomplete="off" required>
        </div>

        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="new-password" required>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label> 
          <input type="password" id="confirmPassword" autocomplete="new-password" required>
        </div>

        <button type="submit" class="create-btn">Create Account</button>

      </form>

      <p class="footer-text">
        Already have an account? <a href="Login.html">Login here</a>
      </p>
    </div>
  </div>

  <script>
    // The most effective way: Keep inputs read-only until they are clicked.
    // This stops the browser from scanning the page for autofill on load.
    window.onload = () => {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.setAttribute('readonly', 'readonly');
        input.style.backgroundColor = "inherit"; // Keep your styling
        
        input.addEventListener('focus', function() {
          this.removeAttribute('readonly');
        });
      });
    };

    document.getElementById("createForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value;
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      try {
        const response = await fetch("http://localhost:3000/create-account", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fullName, username, password })
        });

        const data = await response.json();

        if (data.success) {
          alert("Account created successfully!");
          window.location.href = "Login.html";
        } else {
          alert("Username already exists!");
        }

      } catch (error) {
        alert("Server error! Make sure backend is running.");
        console.error(error);
      }
    });
  </script>

</body>

</html>
