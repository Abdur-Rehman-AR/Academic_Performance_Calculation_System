<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UOE | Home</title>
  <link rel="icon" href="uoe logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --primary: #059669; 
    --primary-dark: #064e3b;
    --accent: #10b981;
    --text-dark: #1e293b;
    --text-light: #f8fafc;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  /* DYNAMIC ANIMATED BACKGROUND */
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--text-dark);
    overflow-x: hidden;
    position: relative;
    /* Base background color */
    background-color: #f0fdf4; 
    z-index: 1;
  }

  /* The "Magic" Background Layers */
  body::before, body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }

  body::before {
    background: 
      radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.3) 0px, transparent 50%),
      radial-gradient(at 100% 0%, rgba(5, 150, 105, 0.2) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.3) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(52, 211, 153, 0.2) 0px, transparent 50%);
    animation: gradientShift 15s ease infinite alternate;
  }

  @keyframes gradientShift {
    0% { transform: scale(1); }
    100% { transform: scale(1.2); }
  }

  /* NAVBAR - Increased blur for the dynamic background */
  .navbar {
    width: 100%;
    padding: 1.5rem 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.7);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  }

  .nav-left {
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--primary-dark);
    letter-spacing: -0.5px;
  }

  .nav-right {
    display: flex;
    gap: 1rem;
  }

  button {
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 0.9rem;
  }

  .login-btn {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--primary);
    color: var(--primary);
  }

  .login-btn:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
  }

  .signup-btn {
    background: var(--primary);
    border: 1px solid var(--primary);
    color: white;
    box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
  }

  .signup-btn:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(5, 150, 105, 0.4);
  }

  /* HERO SECTION */
  .hero {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 10%;
    max-width: 1400px;
    margin: 0 auto;
    gap: 4rem;
  }

  .text-content {
    flex: 1;
    animation: fadeInUp 0.8s ease-out;
  }

  .text-content h1 {
    font-size: 3.5rem;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    color: var(--primary-dark);
    text-shadow: 0 2px 10px rgba(255,255,255,0.5);
  }

  .text-content p {
    font-size: 1.1rem;
    line-height: 1.8;
    color: #334155;
    margin-bottom: 2.5rem;
    max-width: 550px;
  }

  .visual-content {
    flex: 1;
    display: flex;
    justify-content: center;
    animation: float 6s ease-in-out infinite;
  }

  .logo-container {
    background: rgba(255, 255, 255, 0.8);
    padding: 2.5rem;
    border-radius: 40px;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
  }

  .logo-container img {
    width: 280px;
    height: auto;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05));
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
  }

  @media (max-width: 968px) {
    .hero { flex-direction: column-reverse; padding: 4rem 5%; text-align: center; }
    .text-content h1 { font-size: 2.5rem; }
    .text-content p { margin: 0 auto 2.5rem; }
  }
</style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <span>UNIVERSITY OF EDUCATION, LAHORE</span>
    </div>
    <div class="nav-right">
      <button class="login-btn" onclick="window.location.href='Login.html'">Log In</button>
      <button class="signup-btn" onclick="window.location.href='Create_Account.html'">Create Account</button>
    </div>
  </nav>

  <main class="hero">
    <div class="text-content">
      <h1>Streamline Your Academic Excellence.</h1>
      <p>
        A powerful digital ecosystem designed for precise performance tracking. 
        Empower educators with real-time analytics, automated result calculations, 
        and secure data management.
      </p>
    </div>

    <div class="visual-content">
      <div class="logo-container">
        <img src="uoe logo.png" alt="UOE University Logo">
      </div>
    </div>
  </main>

</body>
</html>
